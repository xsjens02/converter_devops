name: calculatorProject
services:
  mariadb:
    image: mariadb:latest
    container_name: db
    restart: always
    privileged: true
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PWD}   
      MARIADB_DATABASE: ${MYSQL_DB}             
      MARIADB_USER: ${MYSQL_USER}               
      MARIADB_PASSWORD: ${MYSQL_PWD}
    volumes:
      - mariadb_data:/var/lib/mysql
    
  flyway:
    image: flyway/flyway:latest
    container_name: flyway
    depends_on:
      - mariadb
    volumes:
      - ./db/migrations:/flyway/sql
    command: "migrate"
    environment:
      FLYWAY_URL: ${FLYWAY_URL}
      FLYWAY_USER: ${MYSQL_USER}
      FLYWAY_PASSWORD: ${MYSQL_PWD}
      FLYWAY_CONNECT_RETRIES: 10
      FLYWAY_CONNECT_RETRIES_INTERVAL: 5
  
  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    depends_on:
      - flyway
    ports:
      - "${ZIPKIN_PORT}:9411"

  seq:
    image: datalust/seq
    container_name: seq
    depends_on:
      - zipkin
    ports:
      - "${SEQ_LOG_RECEIVER_PORT}:5341"
      - "${SEQ_WEB_INTERFACE_PORT}:80"
    volumes:
      - rps_seq_data:/data
    environment:
      - ACCEPT_EULA=Y
  
  api:
    image: ghcr.io/${GH_REPO}-api:staging
    container_name: api
    restart: always
    depends_on:
      - seq
    environment:
      DB_CON_STR: ${DB_CON_STR}
      LOG_LEVEL: ${LOG_LEVEL}
      ZIPKIN_URL: ${ZIPKIN_URL}
      SEQ_URL: ${SEQ_URL}
    ports:
      - "${API_PORT}:8080"
  
  react:
    image: ghcr.io/${GH_REPO}-react:staging
    container_name: react
    restart: always
    depends_on:
      - api
    ports:
      - "${REACT_PORT}:80"

volumes:
  mariadb_data:
  rps_seq_data: